name: Elixir CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Clone EAGL (path dependency)
        run: |
          git clone --depth 1 --branch main https://github.com/robinhilliard/eagl.git ../eagl

      - name: Install GUI and OpenGL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwxgtk3.0-gtk3-0v5 \
            libwxgtk3.0-gtk3-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            xvfb \
            x11-utils \
            libx11-dev \
            libxrandr2 \
            libxi6 \
            libxcursor1 \
            libxinerama1 \
            libgtk-3-dev \
            libglib2.0-dev

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "26.2"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests with virtual display
        run: |
          xvfb-run -a mix test 2>&1 | tee test.log
          EXIT=$?
          if [ $EXIT -eq 139 ] || [ $EXIT -eq 134 ]; then
            if grep -q "0 failures" test.log; then
              echo "Tests passed; ignoring shutdown crash (known Mesa/wx/xvfb issue)"
              exit 0
            fi
          fi
          exit $EXIT
        env:
          LIBGL_ALWAYS_SOFTWARE: 1
          CI: true
